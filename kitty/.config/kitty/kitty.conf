# Kitty Configuration - Matching Ghostty Abernathy Theme + tmux-style tabs
# =========================================================================

# Font
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

initial_window_width  800
initial_window_height 500
remember_window_size  no
window_padding_width 6

# -------------------------
# Performance Tuning
# -------------------------
repaint_delay 8
input_delay 0
sync_to_monitor no
cursor_blink_interval 0

# Background transparency (matching Ghostty 0.89)
background_opacity 0.89
dynamic_background_opacity yes

# Hide window decorators
hide_window_decorations yes 
# -------------------------
# Abernathy Color Scheme
# -------------------------
foreground #eeeeec
background #111416

# Cursor
cursor #bbbbbb
cursor_text_color #111416

# Selection
selection_foreground #333333
selection_background #eeeeec

# Color palette (Abernathy)
color0  #000000
color1  #cd0000
color2  #00cd00
color3  #cdcd00
color4  #1093f5
color5  #cd00cd
color6  #00cdcd
color7  #faebd7
color8  #404040
color9  #ff0000
color10 #00ff00
color11 #ffff00
color12 #11b5f6
color13 #ff00ff
color14 #00ffff
color15 #ffffff

# -------------------------
# Tab Bar (tmux-style)
# -------------------------
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_switch_strategy previous
tab_bar_background #1a1a1a

# Tab colors (matching tmux Tokyonight style)
# Active tab: cyan text, slightly lighter bg
active_tab_foreground   #87d7ff
active_tab_background   #303030
active_tab_font_style   bold

# Inactive tab: gray text, dark bg
inactive_tab_foreground #8a8a8a
inactive_tab_background #1a1a1a
inactive_tab_font_style normal

# Tab title template
tab_title_template        " {index}: {title} "
active_tab_title_template " {index}: {title} "

# -------------------------
# Window/Split Settings
# -------------------------
# Enable splits layout for tmux-like panes
enabled_layouts splits,stack,tall,fat,grid

# Active window indicator
bell_border_color #ff5555

# Dim inactive panes slightly (like tmux unfocused-split-opacity)
inactive_text_alpha 0.8

# Draw minimal borders around panes
draw_minimal_borders yes

# -------------------------
# Keybindings (tmux-like)
# -------------------------
# Use Ctrl+A as prefix-like leader (tap twice for literal Ctrl+A)
# Note: Kitty doesn't have prefix mode, but we can use Ctrl+Shift

# Splits (tmux-like: | for vertical, ' for horizontal)
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+' launch --location=hsplit --cwd=current

# Navigate panes with Ctrl+Shift+hjkl (vim-style)
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Resize panes
map ctrl+shift+alt+h resize_window narrower 3
map ctrl+shift+alt+l resize_window wider 3
map ctrl+shift+alt+k resize_window taller 3
map ctrl+shift+alt+j resize_window shorter 3

# Zoom/unzoom pane (like tmux prefix+z)
map ctrl+shift+z toggle_layout stack

# New tab
map ctrl+shift+t new_tab_with_cwd

# Close tab/window
map ctrl+shift+q close_window
map ctrl+shift+w close_tab

# Tab navigation
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Go to specific tab (Alt+number like tmux)
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9

# -------------------------
# Misc
# -------------------------
# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# URL handling
url_style curly
open_url_with default

# Confirm on close if processes running
confirm_os_window_close -1

# Shell integration
shell_integration enabled
