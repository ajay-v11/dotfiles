# ~/.tmux.conf

# Prefix remap to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Pane splitting
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Pane navigation with Alt + arrows
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes with Alt + Shift + arrows
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

# Next window with Ctrl+Esc
bind -n C-Escape next-window

# --- Vim-style copy mode ---
setw -g mode-keys vi

# Start selection with v, copy with y
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi r send -X rectangle-toggle
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Scroll by line
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up

# Scroll by half-page
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-u send -X halfpage-up

# Scroll by full page
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi C-b send -X page-up


# Move cursor faster (like w/b/e in Vim)
bind -T copy-mode-vi w send -X next-word
bind -T copy-mode-vi b send -X previous-word
bind -T copy-mode-vi e send -X end-of-word

# Scroll to top/bottom of window
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Enter copy mode with prefix + [
bind [ copy-mode

# Search in copy mode using /
bind -T copy-mode-vi / command-prompt "search-forward %%"
bind -T copy-mode-vi ? command-prompt "search-backward %%"
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi N send -X search-reverse

# Better colors and graphics support
set -g default-terminal "tmux-256color"

# Terminal overrides for true color (RGB) support - consolidated
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*256col*:RGB"
set -ga terminal-overrides ",xterm-kitty:RGB"

# Terminal features for Kitty/Ghostty graphics protocol support (tmux 3.2+)
set -as terminal-features 'xterm-kitty:RGB:hyperlinks:usstyle:sync:clipboard:strikethrough'
set -as terminal-features 'xterm-ghostty:RGB:hyperlinks:usstyle:sync:clipboard:strikethrough'

# Enable passthrough for ALL panes (required for graphics in background windows)
set -g allow-passthrough all

# Enable extended keys for better keyboard protocol support
set -g extended-keys on

# Preserve environment variables from parent terminal (required for yazi image preview)
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment COLORTERM

# Enable external clipboard integration
set -g set-clipboard external

# --- Tokyonight-inspired colors ---
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-bg colour235
set -g status-fg colour250

# Left side: session + path
set -g status-left-length 60
set -g status-left '#[fg=colour81,bold] #S #[fg=colour245] #[fg=colour186]#{b:pane_current_path} '

# Right side: time + date
set -g status-right-length 90
set -g status-right '#[fg=colour245] #[fg=colour117]%H:%M #[fg=colour141]%Y-%m-%d #[fg=colour245] '

# Active/inactive window titles
setw -g window-status-current-style fg=colour81,bg=colour236,bold
setw -g window-status-current-format ' #[fg=colour81,bold]#I:#W #[default] '
setw -g window-status-style fg=colour244,bg=colour235
setw -g window-status-format ' #[fg=colour244]#I:#W #[default] '

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour81

# Message styling
set -g message-style bg=colour236,fg=colour81
set -g message-command-style bg=colour236,fg=colour117

# Reduce delay for faster key sequences (10ms to preserve Alt key combos)
set -s escape-time 10

